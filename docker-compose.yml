services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autistic-cow
      POSTGRES_PASSWORD: autistic-cow
      POSTGRES_DB: autistic-cow
    ports: ["5444:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U autistic-cow -p 5432"], interval: 5s, retries: 10 }

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment: { MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin }
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  api:
    build: { context: ./server }
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://autistic-cow:autistic-cow@postgres:5444/autistic-cow
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    ports: ["8008:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    profiles: ["full"]

  worker:
    build: { context: ./server }
    command: uv run arq app.workers.main.WorkerSettings
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://autistic-cow:autistic-cow@postgres:5444/autistic-cow
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
    profiles: ["full"]

volumes:
  pgdata:
  miniodata:
